name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: what
    attributes:
      label: What's the use case?
      description: What are you trying to do? Why is the current behavior insufficient?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: If you have an idea for the UX or implementation, sketch it here. Otherwise leave blank.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools / workarounds you tried.
